name: Update hermes-agent Docker image
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"
permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write
concurrency:
  group: update-hermes-image
  cancel-in-progress: true
jobs:
  update-hermes-image:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Fetch latest hermes-agent version tag
        id: version
        run: |
          # Fetch tags from Docker Hub API, extract the latest versioned tag (vYYYY.M.D*)
          # excluding 'latest' and 'main'
          TOKEN=$(curl -s "https://auth.docker.io/token?service=registry.docker.io&scope=repository:nousresearch/hermes-agent:pull" | jq -r '.token')
          TAGS=$(curl -s -H "Authorization: Bearer $TOKEN" \
            "https://registry-1.docker.io/v2/nousresearch/hermes-agent/tags/list?n=100" | jq -r '.tags[]')

          LATEST_VERSIONED=$(echo "$TAGS" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | sort -V | tail -1)

          if [ -z "$LATEST_VERSIONED" ]; then
            echo "No versioned tags found"
            exit 1
          fi

          echo "latest_versioned=$LATEST_VERSIONED" >> "$GITHUB_OUTPUT"
          echo "Latest versioned tag: $LATEST_VERSIONED"
      - name: Check current pinned version
        id: current
        run: |
          CURRENT=$(grep -oP 'nousresearch/hermes-agent:v[\d.]+' \
            nix/modules/nixos/hosting/hermes/default.nix | head -1 | sed 's|nousresearch/hermes-agent:||')

          if [ -z "$CURRENT" ]; then
            echo "Could not find pinned version"
            exit 1
          fi

          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Current pinned version: $CURRENT"
      - name: Update if newer
        if: steps.version.outputs.latest_versioned != steps.current.outputs.current
        id: update
        run: |
          LATEST="${{ steps.version.outputs.latest_versioned }}"
          CURRENT="${{ steps.current.outputs.current }}"

          echo "Updating from $CURRENT to $LATEST"
          sed -i "s|nousresearch/hermes-agent:${CURRENT}|nousresearch/hermes-agent:${LATEST}|g" \
            nix/modules/nixos/hosting/hermes/default.nix

          echo "updated=true" >> "$GITHUB_OUTPUT"
      - name: Create Pull Request
        if: steps.update.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          commit-message: "chore(deps): update hermes-agent Docker image to ${{ steps.version.outputs.latest_versioned }}"
          title: "chore(deps): update hermes-agent to ${{ steps.version.outputs.latest_versioned }}"
          body: |
            Automated update of the hermes-agent Docker image tag.

            - **Current:** `${{ steps.current.outputs.current }}`
            - **Latest:** `${{ steps.version.outputs.latest_versioned }}`
          branch: chore/update-hermes-image
          labels: |
            dependencies
            automated
