apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault
  namespace: flux-system
spec:
  interval: 30m
  timeout: 15m
  releaseName: vault
  targetNamespace: vault
  install:
    createNamespace: true
    disableWait: true
  upgrade:
    disableWait: false
  chart:
    spec:
      chart: vault
      version: 0.32.0
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: flux-system
  values:
    injector:
      enabled: false
    server:
      dev:
        enabled: true
        devRootToken: dev-root-for-eso-bootstrap-only
      standalone:
        enabled: false
