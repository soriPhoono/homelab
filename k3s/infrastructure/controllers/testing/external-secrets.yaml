apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: flux-system
spec:
  interval: 30m
  timeout: 15m
  releaseName: external-secrets
  targetNamespace: external-secrets
  install:
    createNamespace: true
    crds: CreateReplace
    # k3d/small clusters: cert-controller + webhook need a moment for the tls Secret / CA; Helm's
    # default wait can exceed ~10m and mark the install Failed (blocks infrastructure Kustomization).
    disableWait: true
  upgrade:
    crds: CreateReplace
    disableWait: true
  chart:
    spec:
      chart: external-secrets
      version: 2.4.1
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system
  values:
    installCRDs: true
