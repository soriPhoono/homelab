apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: netbird-kubernetes-operator
  namespace: flux-system
spec:
  interval: 30m
  timeout: 10m
  releaseName: netbird-operator
  targetNamespace: netbird
  dependsOn:
    - name: cert-manager
      namespace: flux-system
  install:
    createNamespace: true
    disableWait: true
  # Match install: Flux `infrastructure` Kustomization uses `wait: true`; without this, Helm
  # waits for the operator/webhook rollout and can block the whole sync (e.g. API key, cert lag).
  upgrade:
    disableWait: true
  chart:
    spec:
      chart: kubernetes-operator
      version: 0.3.1
      sourceRef:
        kind: HelmRepository
        name: netbirdio
        namespace: flux-system
  values:
    cluster:
      name: testing
    webhook:
      enableCertManager: true
    netbirdAPI:
      keyFromSecret:
        name: netbird-mgmt-api-key
        key: NB_API_KEY
