apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  interval: 30m
  releaseName: cert-manager
  targetNamespace: cert-manager
  install:
    createNamespace: true
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: cert-manager
      version: v1.20.2
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
  values:
    # Chart defaults to crds.enabled=false; without CRDs, cainjector breaks and NetBird cannot use Certificate.
    crds:
      enabled: true
      keep: true
    # k3d/local: startupapicheck often times out waiting on the webhook; controllers still run.
    startupapicheck:
      enabled: false
    global:
      leaderElection:
        namespace: cert-manager
