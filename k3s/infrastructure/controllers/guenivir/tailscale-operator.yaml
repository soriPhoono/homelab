apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: flux-system
spec:
  interval: 30m
  timeout: 10m
  releaseName: tailscale-operator
  targetNamespace: tailscale
  install:
    createNamespace: true
    disableWait: true
  upgrade:
    disableWait: false
  chart:
    spec:
      chart: tailscale-operator
      version: 1.96.5
      sourceRef:
        kind: HelmRepository
        name: tailscale
        namespace: flux-system
  values:
    installCRDs: true
    oauth: {}
    operatorConfig:
      hostname: tailscale-operator-guenivir
