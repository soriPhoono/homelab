# Traefik dashboard UI: open http(s)://<host>/dashboard/ (trailing slash matters).
# Not authenticated — restrict by network, add auth middleware, or keep internal-only.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: traefik-dashboard
  namespace: kube-system
spec:
  ingressClassName: traefik
  rules:
    - host: traefik.testing.apps.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: traefik-dashboard
                port:
                  name: traefik
    # NetBird mesh: after DNS for this host reaches the cluster (Custom Zone / CNAME), Traefik routes by Host.
    - host: traefik.admin.vpn.cryptic-coders.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: traefik-dashboard
                port:
                  name: traefik
    # Canonical hostname created by the operator when dnsZoneRef matches zones[].name == vpn.cryptic-coders.net.
    # If your zone API name differs, patch this host or add a Kustomize patch to match traefik-netbird.kube-system.<zone.Name>.
    - host: traefik-netbird.kube-system.vpn.cryptic-coders.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: traefik-dashboard
                port:
                  name: traefik
