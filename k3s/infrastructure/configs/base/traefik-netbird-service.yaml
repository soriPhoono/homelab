# Duplicate ClusterIP to Traefik’s HTTP entrypoint for NetBird NetworkResource exposure.
# Selector matches Traefik Helm chart pod labels (release traefik, namespace kube-system).
apiVersion: v1
kind: Service
metadata:
  name: traefik-netbird
  namespace: kube-system
  labels:
    app.kubernetes.io/name: traefik
spec:
  type: ClusterIP
  ports:
    - name: web
      port: 80
      protocol: TCP
      targetPort: web
  selector:
    app.kubernetes.io/instance: traefik-kube-system
    app.kubernetes.io/name: traefik
