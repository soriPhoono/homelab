# Exposes Service traefik-netbird to NetBird peers (Networks + routing peer + Custom DNS zone).
# This is private mesh access, not the public "Reverse Proxy" product
# (https://docs.netbird.io/manage/reverse-proxy — edge TLS, internet-facing domains).
# To also publish via Reverse Proxy, use Dashboard → Networks → Expose Service on the resource, or add
# a Reverse Proxy service whose target is this domain resource; enable "Pass Host Header" if the app needs it.
#
# Operator DNS A record name (NetBird API record.Name): <service>.<namespace>.<zone.Name>
# where zone.Name comes from the matched zone (same value you put in dnsZoneRef once lookup succeeds).
# Canonical FQDN example when zone.Name is vpn.cryptic-coders.net:
#   traefik-netbird.kube-system.vpn.cryptic-coders.net
# Add matching Ingress host below; vanity traefik.admin.vpn... needs CNAME → canonical if names differ.
apiVersion: netbird.io/v1alpha1
kind: NetworkResource
metadata:
  name: traefik-netbird
  namespace: kube-system
spec:
  networkRouterRef:
    name: vpn-cryptic-coders
    namespace: netbird
  serviceRef:
    name: traefik-netbird
  groups:
    - name: All
