apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - vault-dev-root-token.yaml
  - vault-bootstrap-job.yaml
  - clustersecretstore-vault.yaml
  - externalsecret-sample-vault.yaml
  - clusterissuer-selfsigned.yaml
  - clusterissuer-letsencrypt-staging.yaml
patches:
  - patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: traefik.guenivir.apps.local
    target:
      kind: Ingress
      name: traefik-dashboard
      namespace: kube-system
