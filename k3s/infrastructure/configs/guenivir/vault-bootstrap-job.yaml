apiVersion: batch/v1
kind: Job
metadata:
  name: vault-bootstrap-kv
  namespace: vault
spec:
  backoffLimit: 12
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: hashicorp/vault:1.21.2
          env:
            - name: VAULT_ADDR
              value: http://vault.vault.svc:8200
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vault-dev-root-token
                  key: token
          command:
            - /bin/sh
            - -ec
            - |
              echo "waiting for Vault..."
              i=0
              while [ "$i" -lt 90 ]; do
                if vault status >/dev/null 2>&1; then
                  echo "Vault is reachable"
                  break
                fi
                i=$((i + 1))
                sleep 2
              done
              vault secrets enable -path=secret kv-v2 2>/dev/null || true
              vault kv put secret/cluster-defaults/sample msg="hello-from-vault"
              echo "KV bootstrap finished"
