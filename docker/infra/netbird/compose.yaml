# Netbird — secure overlay network for swarm services (Tailscale alternative)
#
# Runs the Netbird sidecar on the swarm manager, providing
# a WireGuard-based overlay mesh.  Use when Tailscale is not
# available or a self-hosted control plane is preferred.
#
# Secrets (via sops or docker secret):
#   netbird_setup_key   — pre-authentication key for joining the Netbird network
#
# Environment overrides:
#   NB_MANAGEMENT_URL — Netbird management server URL
#   NB_HOSTNAME       — node hostname (default: <host>-swarm)
#
# Usage:
#   docker stack deploy -c compose.yaml netbird
services:
  netbird:
    image: netbirdio/netbird:latest
    hostname: ${NB_HOSTNAME:-{{.Node.Hostname}}-swarm}
    command:
      - up
      - --setup-key=/run/secrets/netbird_setup_key
      - --management-url=${NB_MANAGEMENT_URL:-https://api.wiretrustee.com:33073}
      - --log-file=console
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_MODULE
    volumes:
      - netbird-state:/var/lib/netbird
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
secrets:
  netbird_setup_key:
    external: true
volumes:
  netbird-state:
