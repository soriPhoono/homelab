# Tailscale — secure overlay network for swarm services
#
# Runs the Tailscale sidecar on the swarm manager, providing
# a secure WireGuard-based overlay for inter-node and external
# access.  Combine with Traefik to expose services via Tailscale
# Serve/Funnel or direct Tailscale IP.
#
# Secrets (via sops or docker secret):
#   tailscale_auth_key   — pre-authentication key (nullable; set to "" for web auth flow)
#
# Environment overrides:
#   TS_HOSTNAME   — node hostname in the tailnet (default: <host>-swarm)
#   TS_SERVE_PORT — port for Tailscale Serve (default: 443)
#
# Usage:
#   docker stack deploy -c compose.yaml tailscale
services:
  tailscale:
    image: tailscale/tailscale:latest
    hostname: ${TS_HOSTNAME:-{{.Node.Hostname}}-swarm}
    environment:
      TS_AUTHKEY: /run/secrets/tailscale_auth_key
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
      TS_EXTRA_ARGS: |
        --accept-routes
        --advertise-routes=${TS_ADVERTISE_ROUTES:-172.16.0.0/12}
      TS_SERVE_PORT: ${TS_SERVE_PORT:-443}
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
secrets:
  tailscale_auth_key:
    external: true
volumes:
  tailscale-state:
