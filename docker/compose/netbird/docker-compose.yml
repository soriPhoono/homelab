version: '3.8'

services:
  dashboard:
    image: netbirdio/dashboard:latest
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    environment:
      - NETBIRD_MGMT_API_ENDPOINT=https://netbird.local
      - NETBIRD_MGMT_GRPC_API_ENDPOINT=https://netbird.local:443
      - NETBIRD_AUTH_OIDC_CONFIGURATION_ENDPOINT_FILE=/run/secrets/dashboard_oidc_config
    secrets:
      - dashboard_oidc_config
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure

  signal:
    image: netbirdio/signal:latest
    ports:
      - target: 80
        published: 10000
        mode: ingress
    volumes:
      - signal_data:/var/lib/netbird
    command: ["--log-file", "console", "--port", "80"]
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]

  relay:
    image: netbirdio/relay:latest
    ports:
      - target: 33080
        published: 33080
        mode: ingress
    environment:
      - NB_LOG_LEVEL=info
      - NB_LISTEN_ADDRESS=:33080
      - NB_EXPOSED_ADDRESS=turn://netbird.local:33080
      - NB_AUTH_SECRET_FILE=/run/secrets/relay_auth_secret
    secrets:
      - relay_auth_secret
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]

  management:
    image: netbirdio/management:latest
    ports:
      - target: 443
        published: 33073
        mode: ingress
    volumes:
      - management_data:/var/lib/netbird
    configs:
      - source: management_config
        target: /etc/netbird/management.json
    secrets:
      - management_store_engine_postgres_dsn
    environment:
      - NETBIRD_STORE_ENGINE_POSTGRES_DSN_FILE=/run/secrets/management_store_engine_postgres_dsn
    command: [
      "--port", "443",
      "--log-file", "console",
      "--log-level", "info",
      "--single-account-mode-domain=netbird.local",
      "--dns-domain=netbird.local"
    ]
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]

  coturn:
    image: coturn/coturn:latest
    # network_mode: host is not allowed in swarm, instead we publish ports
    ports:
      - target: 3478
        published: 3478
        mode: host
      - target: 3478
        published: 3478
        protocol: udp
        mode: host
      - target: 5349
        published: 5349
        mode: host
      - target: 5349
        published: 5349
        protocol: udp
        mode: host
    configs:
      - source: turnserver_config
        target: /etc/turnserver.conf
    command: ["-c", "/etc/turnserver.conf"]
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]

volumes:
  signal_data:
  management_data:

secrets:
  relay_auth_secret:
    external: true
  management_store_engine_postgres_dsn:
    external: true
  dashboard_oidc_config:
    external: true

configs:
  management_config:
    external: true
  turnserver_config:
    external: true
