# ──────────────────────────────────────────────────────────────────────────────
# Cluster: default
# ──────────────────────────────────────────────────────────────────────────────
# This is the config that swarm-cd reads at runtime to know what to deploy.
# Each manager node that references this cluster (via
#   hosting.platforms.swarm.cluster.name = "default"
# in its NixOS config) gets the bootstrap stack deployed automatically after
# swarm init.
#
# Architecture:
#   Every swarm cluster uses Traefik as the reverse proxy (deployed by the
#   Nix module in the bootstrap stack). The exposure layer — Tailscale or
#   Netbird — is a property of how you configure the swarm workloads, NOT a
#   Nix toggle. Reference compose files for both are provided under
#   docker/infra/ as ready-to-deploy blueprints.
#
# Fields:
#   name        — cluster identifier; must match the parent directory name
#   traefik     — reverse proxy configuration
#   stacks      — ordered list of compose stacks to deploy
# ──────────────────────────────────────────────────────────────────────────────
name: default
traefik:
  network: traefik_public
# Ordered stack list — deployed left-to-right on bootstrap.
# Each entry can reference a local directory (relative to this file) or an
# absolute repo path.  The directory must contain a compose.yaml.
# Format: { path: <path>, name: <stack-name> }
stacks:
  - path: ../../infra/traefik
    name: traefik
